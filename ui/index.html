<!DOCTYPE html>
<html lang="zh" data-ui="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>code2pdf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside id="sidebar">

      <div class="logo">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 6.5h4M5 9h8M5 11.5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>code2pdf</span>
        <button id="ui-mode-btn" class="ui-mode-btn" title="切换界面主题">
          <!-- icon injected by JS -->
        </button>
      </div>

      <!-- File -->
      <div class="panel">
        <div class="panel-title">FILE</div>
        <div class="dropzone" id="dropzone">
          <svg class="dropzone-icon" width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 16V8M12 8l-3 3M12 8l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 16.5V18a1.5 1.5 0 001.5 1.5h15A1.5 1.5 0 0021 18v-1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="dropzone-primary">拖放文件或点击选择</span>
          <span class="dropzone-sub">支持 100+ 种编程语言</span>
          <input type="file" id="file-input" hidden>
        </div>

        <!-- Shown after file load -->
        <div class="file-badge" id="file-badge">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <path d="M4 2h5.5L13 5.5V14a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.3"/>
            <path d="M9 2v4h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span id="file-name-display" class="file-name-text"></span>
          <button class="file-clear" id="file-clear" title="移除文件">✕</button>
        </div>

        <!-- Language row — visible after file load -->
        <div class="lang-row" id="lang-row">
          <span class="lang-row-label">语言</span>
          <div class="lang-input-wrap">
            <input
              type="text" id="lang-override"
              class="lang-input" list="lang-list"
              autocomplete="off" spellcheck="false"
              placeholder="自动检测">
            <datalist id="lang-list"></datalist>
          </div>
        </div>
      </div>

      <!-- Theme -->
      <div class="panel theme-panel">
        <div class="panel-title">
          THEME
          <label class="custom-theme-link" title="加载 VSCode .json 主题文件">
            ＋ 自定义
            <input type="file" id="custom-theme-input" accept=".json" hidden>
          </label>
        </div>
        <input class="search-input" id="theme-search" type="text" placeholder="搜索主题…" autocomplete="off" spellcheck="false">
        <div class="theme-list" id="theme-list"></div>
      </div>

      <!-- Options -->
      <div class="panel opts-panel">
        <div class="panel-title">OPTIONS</div>
        <div class="opts">

          <!-- Font size -->
          <div class="opt-row">
            <span class="opt-label">字体大小</span>
            <div class="opt-right">
              <input type="range" id="font-size" min="8" max="20" value="12" step="1">
              <span class="range-val" id="font-size-val">12</span>
            </div>
          </div>

          <!-- Line height -->
          <div class="opt-row">
            <span class="opt-label">行间距</span>
            <div class="opt-right">
              <input type="range" id="line-height" min="0.8" max="3.0" value="1.6" step="0.05">
              <span class="range-val" id="line-height-val">1.6</span>
            </div>
          </div>

          <!-- Toggles -->
          <div class="toggles-row">
            <label class="opt-check">
              <input type="checkbox" id="line-numbers">
              <span class="check-box"></span>
              <span>行号</span>
            </label>
            <label class="opt-check">
              <input type="checkbox" id="wrap-lines" checked>
              <span class="check-box"></span>
              <span>自动换行</span>
            </label>
            <label class="opt-check">
              <input type="checkbox" id="indent-guides">
              <span class="check-box"></span>
              <span>缩进参考线</span>
            </label>
          </div>

          <!-- Indent -->
          <div class="opt-row">
            <span class="opt-label">缩进</span>
            <div class="seg-group" id="indent-seg">
              <button class="seg-btn active" data-value="2">2</button>
              <button class="seg-btn" data-value="4">4</button>
              <button class="seg-btn" data-value="8">8</button>
            </div>
          </div>

          <!-- Page size -->
          <div class="opt-row">
            <span class="opt-label">纸张</span>
            <div class="seg-group" id="page-seg">
              <button class="seg-btn active" data-value="a4">A4</button>
              <button class="seg-btn" data-value="letter">Letter</button>
              <button class="seg-btn" data-value="a3">A3</button>
              <button class="seg-btn" data-value="legal">Legal</button>
            </div>
          </div>

          <!-- Orientation -->
          <div class="opt-row">
            <span class="opt-label">方向</span>
            <div class="seg-group" id="orient-seg">
              <button class="seg-btn active" data-value="portrait">
                <svg width="10" height="12" viewBox="0 0 10 12" fill="none"><rect x="0.5" y="0.5" width="9" height="11" rx="1.5" stroke="currentColor"/></svg>
                纵向
              </button>
              <button class="seg-btn" data-value="landscape">
                <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><rect x="0.5" y="0.5" width="11" height="9" rx="1.5" stroke="currentColor"/></svg>
                横向
              </button>
            </div>
          </div>

          <!-- Scale -->
          <div class="opt-row">
            <span class="opt-label">缩放</span>
            <div class="opt-right">
              <input type="range" id="scale" min="0.5" max="1.5" value="1" step="0.05">
              <span class="range-val" id="scale-val">1.0×</span>
            </div>
          </div>

        </div>
      </div>

      <!-- Presets -->
      <div class="panel presets-panel">
        <div class="panel-title">PRESETS</div>
        <div class="presets-row" id="presets-row">
          <div class="preset-slot" data-idx="0" title="点击保存当前设置">
            <span class="preset-slot-num">1</span><span class="preset-slot-label">空</span>
            <button class="preset-slot-clear" data-clear="0" title="清除">✕</button>
          </div>
          <div class="preset-slot" data-idx="1" title="点击保存当前设置">
            <span class="preset-slot-num">2</span><span class="preset-slot-label">空</span>
            <button class="preset-slot-clear" data-clear="1" title="清除">✕</button>
          </div>
          <div class="preset-slot" data-idx="2" title="点击保存当前设置">
            <span class="preset-slot-num">3</span><span class="preset-slot-label">空</span>
            <button class="preset-slot-clear" data-clear="2" title="清除">✕</button>
          </div>
        </div>
      </div>

      <!-- Export -->
      <button class="export-btn" id="export-btn" disabled>
        <span class="export-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 3v13M7 11l5 5 5-5M3 20h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span id="export-label">导出 PDF</span>
        <span class="spinner" id="export-spinner"></span>
      </button>

    </aside>

    <!-- ── Preview ───────────────────────────────────────────────── -->
    <main id="preview-panel">

      <!-- Info bar -->
      <div class="preview-bar" id="preview-bar">
        <div class="preview-bar-left">
          <span id="preview-filename"></span>
          <span class="preview-bar-sep">·</span>
          <span id="preview-lang-label"></span>
          <span class="preview-bar-sep">·</span>
          <span id="preview-lines"></span>
        </div>
        <div class="preview-bar-right">
          <span id="preview-theme-label"></span>
          <span class="preview-badge">预览</span>
        </div>
      </div>

      <!-- Empty state -->
      <div class="preview-empty" id="preview-empty">
        <div class="preview-empty-art">
          <svg width="52" height="52" viewBox="0 0 56 56" fill="none">
            <rect x="4" y="4" width="48" height="48" rx="10" stroke="currentColor" stroke-width="2" opacity="0.2"/>
            <path d="M16 20h10M16 28h24M16 36h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
          </svg>
        </div>
        <p class="preview-empty-title">选择文件以预览</p>
        <p class="preview-empty-sub">支持 100+ 种语言 · 50+ 套主题</p>
      </div>

      <!-- Loading overlay -->
      <div class="preview-loading" id="preview-loading">
        <div class="preview-loading-spinner"></div>
      </div>

      <!-- PDF Preview (replaces code preview) -->
      <div class="pdf-wrap">
        <object id="pdf-object" type="application/pdf" title="PDF 预览"></object>
      </div>

    </main>

  </div>

  <div id="toasts"></div>
  <script src="app.js?v=2"></script>
</body>
</html>
